<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyoMap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@300..800&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="welcome-container" id="welcome">
      <p class="welcome-text">Welcome to</p>
      <h1 class="brand-name">MyoMap</h1>
    </div>

    <div class="main-container" id="main">
        <button class="menu-btn" id="menuBtn">
            <img src="images/dumbbell_icon.png" alt="menu" />
        </button>

        <model-viewer
            id="anatomyModel"
            src="human_male_body.glb"
            alt="3D human anatomy model"
            camera-controls
            auto-rotate
            rotation-per-second="0deg"
            interaction-prompt="none"
            style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; background-color: transparent;"
        >
            <button
                class="muscle-hotspot"
                slot="hotspot-pec-left"
                data-position="0.10554746075834544 1.4022957837717689 0.079908735085198"
                data-normal="0.2862052364936527 0.395026570135825 0.8729493521908007"
                data-muscle="pectoralis-major"
            ></button>

            <button
                class="muscle-hotspot"
                slot="hotspot-pec-right"
                data-position="-0.10116226983010185 1.389013265051698 0.08665179160487066"
                data-normal="-0.2806089101043951 0.3310536003346943 0.9009229452486267"
                data-muscle="pectoralis-major"
            ></button>

            <button
                class="muscle-hotspot"
                slot="hotspot-bicep-left"
                data-position="0.30605865685481015 1.3417451778716094 -0.0364040471227424"
                data-normal="0.17769598403152337 0.1575896845741625 0.9713854171104714"
                data-muscle="bicep"
            ></button>

            <button
                class="muscle-hotspot"
                slot="hotspot-bicep-right"
                data-position="-0.29465796669539707 1.3474808477853966 -0.03575270851973903"
                data-normal="-0.04783982115327389 0.12903610370276486 0.9904852525167813"
                data-muscle="bicep"
            ></button>

            <button
                class="muscle-hotspot"
                slot="hotspot-rectus-abdominis"
                data-position="0 1.1917933518203239 0.08659825424012206"
                data-normal="0.21584482852064701 -0.01167161996714447 0.9763579176143528"
                data-muscle="rectus-abdominis"
            ></button>

            <button
                class="muscle-hotspot"
                slot="hotspot-quadriceps-left"
                data-position="0.1048549869695475 0.7563448511146087 0.0850874573263189"
                data-normal="0.1942320543394566 0.06105450017800851 0.9790537559680204"
                data-muscle="quadriceps-femoris"
            ></button>

            <button
                class="muscle-hotspot"
                slot="hotspot-quadriceps-right"
                data-position="-0.11208242331368871 0.7354764759191963 0.08396459259154837"
                data-normal="-0.33692674110134446 -0.008908839376550895 0.9414887167203813"
                data-muscle="quadriceps-femoris"
            ></button>

            <!-- add more muscles here -->

        </model-viewer>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="close-btn" id="closeBtn">&#8249;</button>
                <h2 class="sidebar-title">MyoMap</h2>
            </div>

            <p>Sources</p>
            <p>Feedback</p>
            <p>Contact Me</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
