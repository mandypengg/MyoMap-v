<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <div class="page">

    <div class="left-panel">

      </div>

      <div class="section">
        <h2 class="section-title">Muscle Function</h2>
        <div class="content-box">
          <p>The biceps is a muscle in the upper arm that is responsible for flexing the elbow and pronating the
            forearm.</p>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">Exercises</h2>
        <div class="content-box">
          <p>Here are some exercises that target the biceps:</p>
          <ul>
            <li>Barbell curls</li>
            <li>Dumbbell curls</li>
            <li>Hammer curls</li>
            <li>Preacher curls</li>
            <li>Concentration curls</li>
          </ul>
        </div>
      </div>
    </div>

      <img src="images/muscle.png" alt="bicep" class="muscle-image" />
    </div>
